backend: "openai"
openai_base_url: ""
openai_api_key: ""
openai_model: ""
connection_settings_path: "openai_settings.json"
system_prompt: "You are a helpful assistant."
temperature: 0.7
n_predict: 512
threads: 4
ctx_size: 2048
extra_args: []
startup_timeout: 180
response_timeout: 180
db_path: "./data/app.db"
window_title: "Gemma Console GUI (PySide6)"
window_width: 1000
window_height: 720
response_token_reserve: 256
max_prompt_chars: 12000

# Legacy llama-cli backend settings are only used when backend: "cli".
llama_cli_path: "/path/to/your/llama-cli"
model_path: "/path/to/your/model.gguf"
